
            <!DOCTYPE html>
<html>
<head>
    <title>Mini CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Client Lead Management System</h1>

    <div class="form-container">
        <input type="text" id="name" placeholder="Client Name">

        <input type="email" id="email" placeholder="Client Email">

        <input type="text" id="source" placeholder="Lead Source">

        <select id="status">
            <option>New</option>
            <option>Contacted</option>
            <option>Converted</option>
        </select>

        <button onclick="addLead()">Add Lead</button>
    </div>

    <h2>Lead List</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Source</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="leadTable">
        </tbody>
    </table>

    <script src="script.js"></script>

</body>
</html>
